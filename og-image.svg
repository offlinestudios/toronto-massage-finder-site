<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="overlay" x1="0" y1="0" x2="0.95" y2="0">
      <stop offset="0%" stop-color="#F6F3EE" stop-opacity="0.95"/>
      <stop offset="48%" stop-color="#F6F3EE" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#F6F3EE" stop-opacity="0.12"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <image href="og-background.png" x="0" y="0" width="1200" height="630" preserveAspectRatio="xMidYMid slice"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#overlay)"/>

  <rect x="58" y="58" width="610" height="514" rx="34" fill="#FFFFFF" fill-opacity="0.92" filter="url(#shadow)"/>

  <image href="toronto-massage-logo.png" x="96" y="96" width="92" height="92" preserveAspectRatio="xMidYMid meet"/>

  <rect x="208" y="112" width="292" height="38" rx="19" fill="#ECFDF5" stroke="#BBF7D0"/>
  <text x="228" y="138" fill="#0F766E" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">TORONTO MASSAGE FINDER</text>

  <text x="96" y="270" fill="#134E4A" font-family="Arial, Helvetica, sans-serif" font-size="62" font-weight="700">Find &amp; book the right</text>
  <text x="96" y="343" fill="#134E4A" font-family="Arial, Helvetica, sans-serif" font-size="62" font-weight="700">massage in Toronto.</text>

  <text x="96" y="405" fill="#5F6B76" font-family="Arial, Helvetica, sans-serif" font-size="28">Top-rated clinics, RMTs, and spas matched</text>
  <text x="96" y="441" fill="#5F6B76" font-family="Arial, Helvetica, sans-serif" font-size="28">to your area and needs.</text>

  <rect x="96" y="485" width="252" height="56" rx="18" fill="#0F766E"/>
  <text x="127" y="522" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Book Appointment</text>

  <text x="96" y="565" fill="#7A838C" font-family="Arial, Helvetica, sans-serif" font-size="22">torontomassagefinder.com</text>
